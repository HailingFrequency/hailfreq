name: hailfreq

# Multi-file kit: config lives in real files under ./ (Caddyfile, synapse/,
# livekit/, coturn/, postgres/) and is bind-mounted via `volumes:`. This works
# on both docker compose and podman-compose. (The previous single-file design
# used Compose `configs:` with inline content, which podman-compose does not
# materialize — so the stack couldn't start on podman.)

services:
  bootstrap:
    image: docker.io/alpine:3.22
    container_name: hailfreq-bootstrap
    # Stays running (not a one-shot) so dependents can use a `service_healthy`
    # condition. podman-compose mishandles `service_completed_successfully` on an
    # Exited one-shot — podman's --requires refuses to start dependents whose dep
    # is Exited ("container state improper"). service_healthy is handled reliably.
    restart: unless-stopped
    volumes:
      - hailfreq-secrets:/secrets
    command:
      - sh
      - -c
      - |
        set -e
        if [ ! -f /secrets/.bootstrap-complete ]; then
          echo "→ Generating secrets..."
          apk add --quiet --no-cache openssl
          for s in postgres_password synapse_registration_shared_secret synapse_macaroon_secret synapse_form_secret livekit_api_key livekit_api_secret turn_shared_secret; do
            openssl rand -hex 32 > /secrets/$$s
            # 644 so non-root service users (coturn runs as 'nobody', synapse as
            # uid 991) can read them. The volume is internal to the stack and, on
            # rootless podman, lives under the user's storage — not world-readable.
            chmod 644 /secrets/$$s
          done
          touch /secrets/.bootstrap-complete
          echo "→ Generated 7 secrets in /secrets"
        else
          echo "→ Secrets already present, skipping generation"
        fi
        echo "→ Bootstrap idle (healthy); dependents may start"
        exec tail -f /dev/null
    healthcheck:
      test: ["CMD-SHELL", "test -f /secrets/.bootstrap-complete"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 3s
    networks:
      - hailfreq

  postgres:
    image: docker.io/postgres:16-alpine
    container_name: hailfreq-postgres
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_healthy
    environment:
      POSTGRES_USER: synapse
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: synapse_init
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - hailfreq-secrets:/run/secrets:ro
      - ./postgres/init-synapse.sh:/docker-entrypoint-initdb.d/10-init-synapse.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U synapse -d synapse"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - hailfreq

  synapse:
    image: docker.io/matrixdotorg/synapse:v1.122.0
    container_name: hailfreq-synapse
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      bootstrap:
        condition: service_healthy
    # entrypoint.sh renders homeserver.yaml via envsubst (HAILFREQ_* from env
    # below + secrets it reads from /run/secrets), then exec's Synapse.
    entrypoint: ["/bin/sh", "/config/entrypoint.sh"]
    environment:
      HAILFREQ_DOMAIN: ${HAILFREQ_DOMAIN:?HAILFREQ_DOMAIN not set}
      HAILFREQ_SERVER_HOSTNAME: ${HAILFREQ_SERVER_HOSTNAME:?HAILFREQ_SERVER_HOSTNAME not set}
    volumes:
      - synapse_data:/data
      - hailfreq-secrets:/run/secrets:ro
      - ./synapse/entrypoint.sh:/config/entrypoint.sh:ro
      - ./synapse/homeserver.yaml.template:/config/homeserver.yaml.template:ro
      - ./synapse/log.config:/config/log.config:ro
    healthcheck:
      test: ["CMD", "curl", "-fSs", "http://localhost:8008/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks:
      - hailfreq

  caddy:
    image: docker.io/caddy:2-alpine
    container_name: hailfreq-caddy
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    environment:
      HAILFREQ_DOMAIN: ${HAILFREQ_DOMAIN:?HAILFREQ_DOMAIN not set}
      HAILFREQ_SERVER_HOSTNAME: ${HAILFREQ_SERVER_HOSTNAME:?HAILFREQ_SERVER_HOSTNAME not set}
      HAILFREQ_ADMIN_EMAIL: ${HAILFREQ_ADMIN_EMAIL:?HAILFREQ_ADMIN_EMAIL not set}
    volumes:
      # Caddy substitutes the {$HAILFREQ_*} placeholders from the env above.
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - hailfreq

  livekit:
    # Pinned to a specific patch (not floating v1.x) so prod upgrades are a
    # deliberate, reviewable, one-line change. Bumped 1.7→1.12 because the
    # livekit-client 2.x bundled in the desktop app uses the /rtc/v1 signalling
    # path, which LiveKit server < 1.8 lacks (404) — breaking track publish
    # (screen-share / mic) while subscribe limped along on the legacy path.
    image: docker.io/livekit/livekit-server:v1.12.0
    container_name: hailfreq-livekit
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_healthy
    # SECURITY (C2): API key/secret come from the bootstrap secrets volume; the
    # entrypoint renders livekit.yaml at runtime (sed) — they're never in host env.
    entrypoint: ["/bin/sh", "/etc/livekit-entrypoint.sh"]
    network_mode: host  # required for ICE/UDP NAT traversal — see docs/deployment.md
    environment:
      HAILFREQ_PUBLIC_IP: ${HAILFREQ_PUBLIC_IP:?HAILFREQ_PUBLIC_IP not set}
    volumes:
      - hailfreq-secrets:/run/secrets:ro
      - ./livekit/livekit.yaml.template:/etc/livekit.yaml.template:ro
      - ./livekit/entrypoint.sh:/etc/livekit-entrypoint.sh:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7880/"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 20s

  coturn:
    image: docker.io/coturn/coturn:4.6
    container_name: hailfreq-coturn
    restart: unless-stopped
    depends_on:
      bootstrap:
        condition: service_healthy
    # SECURITY (C2): static-auth-secret rendered at runtime from /run/secrets.
    entrypoint: ["/bin/sh", "/etc/coturn-entrypoint.sh"]
    network_mode: host
    environment:
      HAILFREQ_PUBLIC_IP: ${HAILFREQ_PUBLIC_IP:?HAILFREQ_PUBLIC_IP not set}
      HAILFREQ_SERVER_HOSTNAME: ${HAILFREQ_SERVER_HOSTNAME:?HAILFREQ_SERVER_HOSTNAME not set}
    volumes:
      - hailfreq-secrets:/run/secrets:ro
      - ./coturn/turnserver.conf.template:/etc/coturn/turnserver.conf.template:ro
      - ./coturn/entrypoint.sh:/etc/coturn-entrypoint.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pidof turnserver"]
      interval: 30s
      timeout: 5s
      retries: 3

  livekit-auth:
    # Defaults to docker.io/hailfreq/lk-auth. Override via LIVEKIT_AUTH_IMAGE:
    #   ghcr.io/hailingfrequency/livekit-auth:latest  (alternate registry)
    #   hailfreq/livekit-auth:local                    (build from source)
    image: ${LIVEKIT_AUTH_IMAGE:-docker.io/hailfreq/lk-auth:latest}
    container_name: hailfreq-livekit-auth
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_healthy
      bootstrap:
        condition: service_healthy
    environment:
      PORT: "8088"
      SYNAPSE_URL: "http://synapse:8008"
      LIVEKIT_URL: "wss://${HAILFREQ_SERVER_HOSTNAME}/livekit"
    volumes:
      - hailfreq-secrets:/run/secrets:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 10s
    networks:
      - hailfreq

networks:
  hailfreq:
    name: hailfreq

volumes:
  postgres_data:
  synapse_data:
  caddy_data:
  caddy_config:
  hailfreq-secrets:
