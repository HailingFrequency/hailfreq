name: CI

# Lint + unit tests for the desktop client. Runs on every PR to master (so the
# results show up as required status checks) and on master itself after merge.
# Satisfies the OpenSSF Scorecard "CI-Tests" check and unlocks "Require status
# checks to pass" in branch protection (add the `lint` and `test` contexts).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

# Read-only: these jobs only need the source, never write to the repo.
permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Type-check
        working-directory: client
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Unit tests
        working-directory: client
        run: npm run test:unit
