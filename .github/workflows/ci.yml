name: CI

# Lint + unit tests for the desktop client. Runs on every PR to master (so the
# results show up as required status checks) and on master itself after merge.
# Satisfies the OpenSSF Scorecard "CI-Tests" check and unlocks "Require status
# checks to pass" in branch protection (add the `lint` and `test` contexts).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]
  workflow_dispatch:

# Deny all by default; each job grants only what it needs.
permissions: read-all

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Type-check
        working-directory: client
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Unit tests
        working-directory: client
        run: npm run test:unit
